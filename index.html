<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Title and Core Branding -->
    <title>Cenivo</title>
    <meta name="description" content="AI-powered discovery and recommendation platform for movies, series, and anime." />

    <!-- Favicon Configuration with Version Control Cache Busting -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1.0.3" />
    <link rel="alternate icon" type="image/svg+xml" href="/favicon.svg?v=1.0.3" />
    <link rel="apple-touch-icon" href="/favicon.svg?v=1.0.3" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph / Facebook Social Preview metadata -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cenivo - Discover Movies & Series" />
    <meta property="og:description" content="AI-powered discovery and recommendation platform for movies, series, and anime." />
    <meta property="og:image" content="/favicon.svg" />

    <!-- Twitter Social Preview metadata -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cenivo - Discover Movies & Series" />
    <meta name="twitter:description" content="AI-powered discovery and recommendation platform for movies, series, and anime." />
    <meta name="twitter:image" content="/favicon.svg" />
  </head>
  <body class="bg-[#0B0B0B] text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
